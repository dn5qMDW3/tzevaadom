name: Version Bump & Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump:
    name: Bump version, validate & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/tzevaadom/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Calculate new version
        id: new
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update manifest.json
        run: |
          python3 -c "
          import json
          manifest = json.load(open('custom_components/tzevaadom/manifest.json'))
          manifest['version'] = '${{ steps.new.outputs.version }}'
          json.dump(manifest, open('custom_components/tzevaadom/manifest.json', 'w'), indent=2, ensure_ascii=False)
          # Add trailing newline
          with open('custom_components/tzevaadom/manifest.json', 'a') as f:
              f.write('\n')
          "

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/tzevaadom/manifest.json
          git commit -m "chore: bump version to ${{ steps.new.outputs.version }}"
          git tag "v${{ steps.new.outputs.version }}"
          git push origin main --tags

      - uses: home-assistant/actions/hassfest@master

      - uses: hacs/action@main
        with:
          category: integration

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new.outputs.version }}
          generate_release_notes: true
          files: |
            custom_components/tzevaadom/manifest.json
