name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: home-assistant/actions/hassfest@master

      - uses: hacs/action@main
        with:
          category: integration

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/tzevaadom/manifest.json'))['version'])")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag v$TAG does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi
          echo "Tag v$TAG matches manifest version $MANIFEST_VERSION"

  release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            custom_components/tzevaadom/manifest.json
